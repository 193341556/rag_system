<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG 智能文档问答</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #16161f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e8f0;
  --muted: #8888a0;
  --hint: #444458;
  --accent: #6e5fec;
  --accent2: #9d91f5;
  --accent-dim: rgba(110,95,236,0.15);
  --accent-glow: rgba(110,95,236,0.3);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --r: 8px;
  --r-lg: 14px;
  --font-sans: 'Syne', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PAGES ─────────────────────────────── */
.page { display: none; }
.page.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── AUTH PAGE ────────────────────────── */
#page-auth {
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
}
#page-auth::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(110,95,236,0.12) 0%, transparent 70%);
  pointer-events: none;
}
#page-auth::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(62,207,142,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  padding: 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 2rem;
}
.auth-logo-icon {
  width: 40px; height: 40px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
}
.auth-logo-icon svg { width: 20px; height: 20px; }
.auth-logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.auth-logo-sub { font-size: 12px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.04em; }

.auth-tabs {
  display: flex;
  gap: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3px;
  margin-bottom: 1.75rem;
}
.auth-tab {
  flex: 1;
  padding: 7px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--muted);
  border-radius: calc(var(--r) - 2px);
  transition: all 0.2s;
  font-family: var(--font-sans);
}
.auth-tab.on {
  background: var(--accent);
  color: #fff;
}

.field { margin-bottom: 1.1rem; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
  font-family: var(--font-mono);
}
.field input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input::placeholder { color: var(--hint); }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.btn-primary {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.99); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.auth-err {
  font-size: 13px;
  color: var(--red);
  margin-top: 0.75rem;
  min-height: 20px;
  font-family: var(--font-mono);
}

/* ── TOPBAR ───────────────────────────── */
.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 0;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: auto;
  text-decoration: none;
  color: inherit;
}
.topbar-logo-icon {
  width: 30px; height: 30px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-logo-icon svg { width: 15px; height: 15px; }
.topbar-logo-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }

.topbar-nav { display: flex; gap: 2px; margin-right: 1rem; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  background: none;
  border: none;
  border-radius: var(--r);
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.on { background: var(--accent-dim); color: var(--accent2); }
.nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.topbar-right { display: flex; align-items: center; gap: 8px; }
.user-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 10px 5px 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--muted);
}
.user-avatar {
  width: 24px; height: 24px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
}
.logout-btn {
  padding: 6px 12px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── APP BODY ─────────────────────────── */
.app-body {
  flex: 1;
  padding: 1.75rem 1.5rem;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}

/* ── CONFIG BAR ───────────────────────── */
.config-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: var(--r);
  margin-bottom: 1.5rem;
  font-size: 12px;
  color: var(--amber);
  font-family: var(--font-mono);
}
.config-bar svg { width: 14px; height: 14px; flex-shrink: 0; }
.config-bar input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
}
.config-bar button {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
}
.config-bar button:hover { border-color: var(--amber); color: var(--amber); }

/* ── UPLOAD ZONE ──────────────────────── */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--r-lg);
  padding: 2.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1.5rem;
  position: relative;
  background: var(--surface);
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
}
.upload-icon {
  width: 48px; height: 48px;
  margin: 0 auto 1rem;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.upload-icon svg { width: 22px; height: 22px; color: var(--accent2); }
.upload-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.upload-hint { font-size: 13px; color: var(--muted); font-family: var(--font-mono); }

/* ── UPLOAD PROGRESS ──────────────────── */
.upload-prog {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  display: none;
}
.up-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.up-ico {
  width: 38px; height: 38px;
  background: var(--accent-dim);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.up-ico svg { width: 18px; height: 18px; color: var(--accent2); }
.up-name { font-size: 13px; font-weight: 500; }
.up-status { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
.track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0; transition: width 0.25s; }

/* ── SECTION HEADER ───────────────────── */
.sec-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 10px;
}
.sec-title { font-size: 15px; font-weight: 600; }
.sec-meta { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.fbtn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: none;
  cursor: pointer;
  color: var(--muted);
  font-family: var(--font-sans);
  transition: all 0.15s;
}
.fbtn:hover { border-color: var(--accent); color: var(--accent2); }
.fbtn.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

/* ── DOC LIST ─────────────────────────── */
.doc-list { display: flex; flex-direction: column; gap: 8px; }
.doc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.doc-card:hover { border-color: var(--border2); background: var(--surface2); }
.doc-card.ready { cursor: pointer; }
.doc-card.ready:hover { border-color: var(--accent); }
.doc-ico {
  width: 40px; height: 40px;
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.doc-ico.pdf { background: rgba(239,68,68,0.1); }
.doc-ico.txt { background: rgba(62,207,142,0.1); }
.doc-ico svg { width: 20px; height: 20px; }
.doc-ico.pdf svg { color: var(--red); }
.doc-ico.txt svg { color: var(--green); }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
.doc-meta { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
.doc-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.chunks { font-size: 11px; color: var(--hint); font-family: var(--font-mono); }
.badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  font-family: var(--font-mono);
  white-space: nowrap;
}
.badge.pending { background: rgba(136,136,160,0.12); color: var(--muted); border: 1px solid rgba(136,136,160,0.2); }
.badge.processing { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
.badge.ready { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
.badge.failed { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.ask-chip {
  padding: 5px 12px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 20px;
  font-size: 12px;
  color: var(--accent2);
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.ask-chip:hover { background: var(--accent); color: #fff; }

/* ── EMPTY / LOADING ──────────────────── */
.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--hint);
}
.empty svg { width: 44px; height: 44px; display: block; margin: 0 auto 1rem; opacity: 0.4; }
.empty p { font-size: 14px; }
.loading-row {
  text-align: center;
  padding: 3rem;
  color: var(--hint);
  font-size: 13px;
  font-family: var(--font-mono);
}

/* ── PAGINATION ───────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 1.5rem;
}
.pg-btn {
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  font-size: 12px;
  color: var(--muted);
  font-family: var(--font-sans);
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
.pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.pg-info { font-size: 12px; color: var(--hint); font-family: var(--font-mono); }

/* ── CHAT PAGE ────────────────────────── */
#page-chat { background: var(--bg); }
#page-chat .app-body {
  display: flex;
  flex-direction: column;
  padding-bottom: 0;
  flex: 1;
  max-width: 820px;
}

.chat-context {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  margin-bottom: 1.25rem;
}
.chat-context-ico {
  width: 32px; height: 32px;
  background: rgba(239,68,68,0.1);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chat-context-ico svg { width: 16px; height: 16px; color: var(--red); }
.chat-context-name { font-size: 13px; font-weight: 500; flex: 1; }
.chat-context-type { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
.chat-back {
  padding: 6px 12px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.chat-back:hover { border-color: var(--accent); color: var(--accent2); }
.chat-back svg { width: 13px; height: 13px; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  min-height: 0;
  max-height: calc(100vh - 300px);
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.msg { display: flex; gap: 12px; }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 600;
  align-self: flex-start;
}
.msg.user .msg-avatar { background: var(--accent); color: #fff; }
.msg.assistant .msg-avatar {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--accent2);
  font-size: 10px;
}

.msg-bubble {
  max-width: 72%;
  padding: 12px 16px;
  border-radius: var(--r-lg);
  font-size: 14px;
  line-height: 1.7;
}
.msg.user .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 5px;
}
.msg.assistant .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  border-bottom-left-radius: 5px;
}

.msg-sources {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.sources-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.06em; margin-bottom: 7px; }
.source-item {
  font-size: 12px;
  color: var(--muted);
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 6px;
  margin-bottom: 5px;
  font-family: var(--font-mono);
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.typing-indicator {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 14px 16px;
}
.typing-dot {
  width: 6px; height: 6px;
  background: var(--muted);
  border-radius: 50%;
  animation: typingPulse 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

.chat-input-area {
  padding: 1rem 0 1.5rem;
  background: var(--bg);
  flex-shrink: 0;
}
.chat-mode-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.mode-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn svg { width: 13px; height: 13px; }
.mode-btn.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
.mode-btn:hover:not(.on) { border-color: var(--border2); color: var(--text); }

.chat-input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input-wrap {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.chat-input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.chat-input-wrap textarea {
  width: 100%;
  padding: 12px 14px;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-sans);
  resize: none;
  min-height: 48px;
  max-height: 140px;
  line-height: 1.6;
}
.chat-input-wrap textarea::placeholder { color: var(--hint); }

.send-btn {
  width: 48px; height: 48px;
  background: var(--accent);
  border: none;
  border-radius: var(--r-lg);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { opacity: 0.9; }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; }

.stream-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: var(--green);
  font-family: var(--font-mono);
  margin-bottom: 8px;
}
.stream-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: streamPulse 1s ease-in-out infinite;
}
@keyframes streamPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.cache-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px;
  color: var(--amber);
  font-family: var(--font-mono);
  padding: 2px 7px;
  background: var(--amber-dim);
  border-radius: 20px;
  margin-left: 8px;
  vertical-align: middle;
}

/* ── TOAST ────────────────────────────── */
#toast {
  position: fixed;
  bottom: 1.5rem; right: 1.5rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 12px 16px;
  font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(8px);
  opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
  max-width: 300px;
  font-family: var(--font-mono);
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.ok .toast-dot { background: var(--green); }
#toast.err .toast-dot { background: var(--red); }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── SCROLL ANIMATIONS ────────────────── */
.doc-card { animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg { animation: fadeIn 0.25s ease; }

/* ── EMPTY CHAT ───────────────────────── */
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  padding: 2rem;
  color: var(--hint);
}
.chat-empty-icon {
  width: 56px; height: 56px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.7;
}
.chat-empty-icon svg { width: 26px; height: 26px; color: var(--accent2); }
.chat-empty h3 { font-size: 16px; color: var(--muted); font-weight: 500; }
.chat-empty p { font-size: 13px; font-family: var(--font-mono); text-align: center; line-height: 1.7; max-width: 320px; }
.suggestions { display: flex; flex-direction: column; gap: 7px; width: 100%; max-width: 380px; }
.suggestion {
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.suggestion:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
</style>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════════════════ -->
<div class="page active" id="page-auth">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" color="#9d91f5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="auth-logo-text">RAG 文档问答</div>
        <div class="auth-logo-sub">v2.0 · HYBRID RETRIEVAL</div>
      </div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab on" id="tab-login" onclick="switchTab('login')">登录</div>
      <div class="auth-tab" id="tab-reg" onclick="switchTab('reg')">注册</div>
    </div>
    <div class="field">
      <label>用户名</label>
      <input id="u" type="text" placeholder="输入用户名" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input id="p" type="password" placeholder="输入密码" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">登录</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- ══ DOCUMENTS PAGE ════════════════════════════════ -->
<div class="page" id="page-docs">
  <nav class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" color="#9d91f5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="topbar-logo-name">RAG 文档问答</span>
    </div>
    <div class="topbar-nav">
      <button class="nav-btn on" onclick="showDocs()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        文档
      </button>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="nav-avatar">U</div>
        <span id="nav-username">user</span>
      </div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </nav>
  <div class="app-body">
    <div class="config-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
      <span style="white-space:nowrap">后端地址</span>
      <input id="api-url" value="http://localhost:8000" />
      <button onclick="saveApi()">保存</button>
    </div>

    <div class="upload-zone" id="upload-zone"
         ondragover="event.preventDefault()"
         ondrop="onDrop(event)"
         ondragenter="this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')">
      <input type="file" accept=".pdf,.txt" onchange="onFileChange(event)" />
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      </div>
      <div class="upload-title">点击或拖拽文件上传</div>
      <div class="upload-hint">支持 PDF · TXT &nbsp;·&nbsp; 最大 50 MB</div>
    </div>

    <div class="upload-prog" id="upload-prog">
      <div class="up-row">
        <div class="up-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div class="up-name" id="up-name">—</div>
          <div class="up-status" id="up-status">上传中…</div>
        </div>
      </div>
      <div class="track"><div class="bar" id="prog-bar"></div></div>
    </div>

    <div class="sec-hd">
      <span class="sec-title">我的文档</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="sec-meta" id="doc-count">—</span>
        <div class="filters" id="filters">
          <button class="fbtn on" onclick="setFilter(null,this)">全部</button>
          <button class="fbtn" onclick="setFilter('pending',this)">待处理</button>
          <button class="fbtn" onclick="setFilter('processing',this)">处理中</button>
          <button class="fbtn" onclick="setFilter('ready',this)">已就绪</button>
          <button class="fbtn" onclick="setFilter('failed',this)">失败</button>
        </div>
      </div>
    </div>

    <div class="doc-list" id="doc-list">
      <div class="loading-row">loading...</div>
    </div>

    <div class="pagination" id="pagination" style="display:none">
      <button class="pg-btn" id="pg-prev" onclick="changePage(-1)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        上一页
      </button>
      <span class="pg-info" id="pg-info"></span>
      <button class="pg-btn" id="pg-next" onclick="changePage(1)">
        下一页
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ CHAT PAGE ════════════════════════════════════ -->
<div class="page" id="page-chat">
  <nav class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" color="#9d91f5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="topbar-logo-name">RAG 文档问答</span>
    </div>
    <div class="topbar-nav">
      <button class="nav-btn" onclick="showDocs()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        文档
      </button>
      <button class="nav-btn on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        问答
      </button>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="nav-avatar2">U</div>
        <span id="nav-username2">user</span>
      </div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </nav>
  <div class="app-body" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <div class="chat-context" id="chat-context">
      <div class="chat-context-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div class="chat-context-name" id="chat-doc-name">文档名称</div>
        <div class="chat-context-type" id="chat-doc-id">doc_id: —</div>
      </div>
      <button class="chat-back" onclick="showDocs()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回文档
      </button>
    </div>

    <div class="messages" id="messages">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <h3>开始提问</h3>
        <p>基于混合检索（向量 + BM25 + RRF），从文档中精准定位答案</p>
        <div class="suggestions" id="suggestions">
          <button class="suggestion" onclick="fillSuggestion(this)">这篇文档的主要内容是什么？</button>
          <button class="suggestion" onclick="fillSuggestion(this)">请总结文档的核心观点</button>
          <button class="suggestion" onclick="fillSuggestion(this)">文档中有哪些关键数据或结论？</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="chat-mode-toggle">
          <button class="mode-btn on" id="mode-stream" onclick="setMode('stream')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            流式输出
          </button>
          <button class="mode-btn" id="mode-ask" onclick="setMode('ask')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            普通问答
          </button>
        </div>
        <div id="stream-badge" class="stream-badge">
          <div class="stream-dot"></div>
          SSE STREAM
        </div>
      </div>
      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <textarea id="chat-input" placeholder="输入问题，回车发送…" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
let API = localStorage.getItem('rag_api') || 'http://localhost:8000';
let token = localStorage.getItem('rag_token') || '';
let username = localStorage.getItem('rag_user') || '';
let filter = null, page = 1, total = 0;
const PAGE = 10;
const polls = {};
const labels = { pending:'待处理', processing:'处理中', ready:'已就绪', failed:'失败' };

let chatDocId = '';
let chatDocName = '';
let chatMode = 'stream';
let isSending = false;

document.getElementById('api-url').value = API;

function q(id) { return document.getElementById(id); }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  q(id).classList.add('active');
}
function showDocs() { showPage('page-docs'); loadDocs(); }

function switchTab(t) {
  q('tab-login').classList.toggle('on', t === 'login');
  q('tab-reg').classList.toggle('on', t === 'reg');
  q('auth-btn').textContent = t === 'login' ? '登录' : '注册';
  q('auth-err').textContent = '';
}

async function doAuth() {
  const u = q('u').value.trim(), p = q('p').value;
  if (!u || !p) { q('auth-err').textContent = '请填写用户名和密码'; return; }
  const isLogin = q('tab-login').classList.contains('on');
  const btn = q('auth-btn');
  btn.disabled = true; q('auth-err').textContent = '';
  try {
    if (!isLogin) {
      const r = await fetch(`${API}/api/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username: u, password: p })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '注册失败'); }
      toast('注册成功，请登录', 'ok');
      switchTab('login');
      btn.disabled = false; return;
    }
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: u, password: p })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '用户名或密码错误'); }
    const d = await r.json();
    token = d.access_token; username = u;
    localStorage.setItem('rag_token', token);
    localStorage.setItem('rag_user', username);
    enterApp();
  } catch(e) {
    q('auth-err').textContent = e.message || '网络错误，请检查后端地址';
  }
  btn.disabled = false;
}

function enterApp() {
  const initial = (username[0] || 'U').toUpperCase();
  q('nav-avatar').textContent = initial;
  q('nav-username').textContent = username;
  q('nav-avatar2').textContent = initial;
  q('nav-username2').textContent = username;
  showPage('page-docs');
  loadDocs();
}

function logout() {
  token = ''; username = '';
  localStorage.removeItem('rag_token');
  localStorage.removeItem('rag_user');
  Object.values(polls).forEach(clearInterval);
  for (const k in polls) delete polls[k];
  showPage('page-auth');
}

function saveApi() {
  API = q('api-url').value.replace(/\/$/, '');
  localStorage.setItem('rag_api', API);
  toast('后端地址已保存', 'ok');
  loadDocs();
}

function hdrs(json) {
  const h = { 'Authorization': `Bearer ${token}` };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

function setFilter(f, el) {
  filter = f; page = 1;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  loadDocs();
}

function changePage(d) {
  const max = Math.ceil(total / PAGE);
  page = Math.max(1, Math.min(max, page + d));
  loadDocs();
}

async function loadDocs() {
  q('doc-list').innerHTML = '<div class="loading-row">loading...</div>';
  q('pagination').style.display = 'none';
  try {
    let url = `${API}/api/documents/?page=${page}&page_size=${PAGE}`;
    if (filter) url += `&status=${filter}`;
    const r = await fetch(url, { headers: hdrs() });
    if (r.status === 401) { logout(); return; }
    if (!r.ok) throw new Error('加载失败 ' + r.status);
    const d = await r.json();
    total = d.total;
    q('doc-count').textContent = `共 ${total} 个文档`;
    renderDocs(d.items);
    renderPagination(d.total, d.page);
  } catch(e) {
    q('doc-list').innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${e.message}</p></div>`;
  }
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b/1024) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderDocs(items) {
  const list = q('doc-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>暂无文档，上传第一个文件</p></div>';
    return;
  }
  list.innerHTML = items.map(doc => {
    const ext = doc.file_type || 'txt';
    const askBtn = doc.status === 'ready'
      ? `<button class="ask-chip" onclick="openChat('${doc.task_id}','${escHtml(doc.original_name)}')">开始问答 →</button>`
      : '';
    const chunks = doc.status === 'ready'
      ? `<span class="chunks">${doc.chunk_count || 0} 块</span>` : '';
    return `<div class="doc-card ${doc.status}" id="doc-${doc.task_id}">
      <div class="doc-ico ${ext}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="doc-info">
        <div class="doc-name" title="${escHtml(doc.original_name)}">${escHtml(doc.original_name)}</div>
        <div class="doc-meta">${fmtSize(doc.file_size)} · ${fmtDate(doc.created_at)}</div>
      </div>
      <div class="doc-r">
        ${chunks}
        <span class="badge ${doc.status}">${labels[doc.status] || doc.status}</span>
        ${askBtn}
      </div>
    </div>`;
  }).join('');

  items.forEach(doc => {
    if (doc.status === 'pending' || doc.status === 'processing') startPoll(doc.task_id);
  });
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPagination(tot, pg) {
  const max = Math.ceil(tot / PAGE);
  if (max <= 1) { q('pagination').style.display = 'none'; return; }
  q('pagination').style.display = 'flex';
  q('pg-info').textContent = `${pg} / ${max} 页  ·  ${tot} 条`;
  q('pg-prev').disabled = pg <= 1;
  q('pg-next').disabled = pg >= max;
}

function startPoll(taskId) {
  if (polls[taskId]) return;
  polls[taskId] = setInterval(() => pollTask(taskId), 3000);
}

async function pollTask(taskId) {
  try {
    const r = await fetch(`${API}/api/documents/task/${taskId}`, { headers: hdrs() });
    if (!r.ok) return;
    const doc = await r.json();
    if (doc.status === 'ready' || doc.status === 'failed') {
      clearInterval(polls[taskId]); delete polls[taskId];
      const card = q(`doc-${taskId}`);
      if (card) {
        const badge = card.querySelector('.badge');
        if (badge) { badge.className = `badge ${doc.status}`; badge.textContent = labels[doc.status]; }
        card.className = `doc-card ${doc.status}`;
        const docR = card.querySelector('.doc-r');
        if (docR && doc.status === 'ready') {
          if (!docR.querySelector('.ask-chip')) {
            docR.insertAdjacentHTML('beforeend', `<button class="ask-chip" onclick="openChat('${doc.task_id}','${escHtml(doc.filename)}')">开始问答 →</button>`);
          }
          if (!docR.querySelector('.chunks')) {
            docR.insertAdjacentHTML('afterbegin', `<span class="chunks">${doc.chunk_count || 0} 块</span>`);
          }
        }
      }
      toast(doc.status === 'ready' ? `"${doc.filename}" 处理完成` : `"${doc.filename}" 处理失败`, doc.status === 'ready' ? 'ok' : 'err');
    }
  } catch(e) {}
}

function onDrop(e) {
  e.preventDefault();
  q('upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) upload(file);
}
function onFileChange(e) {
  const file = e.target.files[0];
  if (file) upload(file);
  e.target.value = '';
}

async function upload(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','txt'].includes(ext)) { toast('仅支持 PDF 和 TXT', 'err'); return; }
  if (file.size > 50*1024*1024) { toast('文件不能超过 50 MB', 'err'); return; }

  const prog = q('upload-prog'), bar = q('prog-bar');
  prog.style.display = 'block';
  q('up-name').textContent = file.name;
  q('up-status').textContent = '上传中…';
  bar.style.width = '0';

  let fake = 0;
  const ticker = setInterval(() => { fake = Math.min(fake + 8, 85); bar.style.width = fake + '%'; }, 100);

  try {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch(`${API}/api/documents/upload`, {
      method: 'POST', headers: hdrs(), body: fd
    });
    clearInterval(ticker);
    if (r.status === 401) { logout(); return; }
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '上传失败'); }
    const d = await r.json();
    bar.style.width = '100%';
    q('up-status').textContent = '已接收，排队处理中…';
    toast('上传成功', 'ok');
    setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0'; }, 1800);
    page = 1; filter = null;
    document.querySelectorAll('.fbtn').forEach((b,i) => b.classList.toggle('on', i === 0));
    loadDocs();
    startPoll(d.task_id);
  } catch(e) {
    clearInterval(ticker);
    q('up-status').textContent = '上传失败：' + e.message;
    bar.style.width = '0';
    toast(e.message || '上传失败', 'err');
    setTimeout(() => { prog.style.display = 'none'; }, 2500);
  }
}

/* ── CHAT ─────────────────────────────────── */
function openChat(docId, docName) {
  chatDocId = docId;
  chatDocName = docName;
  q('chat-doc-name').textContent = docName;
  q('chat-doc-id').textContent = `doc_id: ${docId}`;
  q('messages').innerHTML = '';
  q('messages').appendChild(buildChatEmpty());
  showPage('page-chat');
  q('chat-input').focus();
}

function buildChatEmpty() {
  const div = document.createElement('div');
  div.className = 'chat-empty';
  div.id = 'chat-empty';
  div.innerHTML = `
    <div class="chat-empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <h3>开始提问</h3>
    <p>基于混合检索（向量 + BM25 + RRF），从文档中精准定位答案</p>
    <div class="suggestions">
      <button class="suggestion" onclick="fillSuggestion(this)">这篇文档的主要内容是什么？</button>
      <button class="suggestion" onclick="fillSuggestion(this)">请总结文档的核心观点</button>
      <button class="suggestion" onclick="fillSuggestion(this)">文档中有哪些关键数据或结论？</button>
    </div>`;
  return div;
}

function fillSuggestion(btn) {
  const input = q('chat-input');
  input.value = btn.textContent;
  input.focus();
  autoResize(input);
}

function setMode(mode) {
  chatMode = mode;
  q('mode-stream').classList.toggle('on', mode === 'stream');
  q('mode-ask').classList.toggle('on', mode === 'ask');
  q('stream-badge').style.display = mode === 'stream' ? 'flex' : 'none';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function sendMessage() {
  const input = q('chat-input');
  const question = input.value.trim();
  if (!question || isSending) return;

  const empty = q('chat-empty');
  if (empty) empty.remove();

  isSending = true;
  q('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMsg('user', question);

  if (chatMode === 'stream') {
    await sendStream(question);
  } else {
    await sendAsk(question);
  }

  isSending = false;
  q('send-btn').disabled = false;
  input.focus();
}

function appendMsg(role, content, extra) {
  const msgs = q('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const initial = role === 'user' ? (username[0] || 'U').toUpperCase() : 'AI';
  div.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div class="msg-bubble" id="bubble-${Date.now()}">${escHtml(content)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function appendTyping() {
  const msgs = q('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendStream(question) {
  const typingEl = appendTyping();

  try {
    const url = `${API}/api/chat/stream?doc_id=${encodeURIComponent(chatDocId)}&question=${encodeURIComponent(question)}`;
    const resp = await fetch(url, { headers: hdrs() });

    if (!resp.ok) throw new Error('请求失败 ' + resp.status);

    typingEl.remove();

    const msgs = q('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg assistant';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    msgDiv.innerHTML = '<div class="msg-avatar">AI</div>';
    msgDiv.appendChild(bubble);
    msgs.appendChild(msgDiv);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let sources = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'chunk') {
            bubble.textContent += data.content;
            msgs.scrollTop = msgs.scrollHeight;
          } else if (data.type === 'done' && data.sources) {
            sources = data.sources;
          }
        } catch(e) {}
      }
    }

    if (sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'msg-sources';
      srcDiv.innerHTML = `<div class="sources-label">SOURCES · ${sources.length}</div>` +
        sources.slice(0,3).map(s => `<div class="source-item">${escHtml(s.text || '')}</div>`).join('');
      bubble.appendChild(srcDiv);
    }

    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    typingEl.remove();
    appendMsg('assistant', '请求失败：' + e.message);
    toast(e.message, 'err');
  }
}

async function sendAsk(question) {
  const typingEl = appendTyping();
  try {
    const r = await fetch(`${API}/api/chat/ask?doc_id=${encodeURIComponent(chatDocId)}&question=${encodeURIComponent(question)}`, {
      method: 'POST', headers: hdrs()
    });
    typingEl.remove();
    if (!r.ok) throw new Error('请求失败 ' + r.status);
    const d = await r.json();

    const msgs = q('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg assistant';
    const cacheHtml = d.from_cache ? `<span class="cache-badge">⚡ 缓存</span>` : '';
    msgDiv.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-bubble">${escHtml(d.answer || '')}${cacheHtml}</div>`;
    msgs.appendChild(msgDiv);
    msgs.scrollTop = msgs.scrollHeight;

    if (d.from_cache) toast('命中缓存，极速返回', 'ok');
  } catch(e) {
    typingEl.remove();
    appendMsg('assistant', '请求失败：' + e.message);
    toast(e.message, 'err');
  }
}

/* ── TOAST ────────────────────────────────── */
let toastTimer;
function toast(msg, type = 'ok') {
  const t = q('toast');
  t.className = type;
  q('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── KEY BINDINGS ─────────────────────────── */
q('u').addEventListener('keydown', e => { if (e.key === 'Enter') q('p').focus(); });
q('p').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

/* ── AUTO RESTORE ─────────────────────────── */
if (token) enterApp();

setMode('stream');
</script>
